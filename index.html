<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alarm</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div id="clock">00:00:00</div>

    <div class="card">
      <label for="alarm-time">アラーム時刻</label>
      <input type="time" id="alarm-time" />
      <div class="buttons">
        <button id="set-btn">セット</button>
        <button id="stop-btn" disabled>止める</button>
      </div>
      <p id="status">アラーム未設定</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
