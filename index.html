<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cozy Wave Alarm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="flash-overlay" id="flash-overlay"></div>

  <div class="container">
    <h1 class="app-title">Cozy Wave Alarm</h1>

    <div class="clock-wrap">
      <svg class="clock-ring" viewBox="0 0 300 300">
        <defs>
          <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#a78bfa"/>
            <stop offset="100%" stop-color="#f472b6"/>
          </linearGradient>
        </defs>
        <circle cx="150" cy="150" r="130" class="ring-bg"/>
        <circle cx="150" cy="150" r="130" class="ring-progress" id="seconds-ring"/>
      </svg>
      <div id="clock">00:00:00</div>
    </div>

    <div class="card">
      <label for="alarm-time">アラーム時刻</label>
      <input type="time" id="alarm-time" />
      <div class="buttons">
        <button id="set-btn">セット</button>
        <button id="stop-btn" disabled>止める</button>
      </div>
      <p id="status">アラーム未設定</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
